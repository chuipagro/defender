name: CI — Build, Test & Deploy

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: write

jobs:
  build-and-test:
    name: Build & Test (ubuntu-22.04)
    runs-on: ubuntu-22.04

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ── System dependencies ─────────────────────────────────────────────────
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build \
            libgl1-mesa-dev \
            libudev-dev \
            libfreetype6-dev \
            libopenal-dev \
            libvorbis-dev \
            libflac-dev \
            libx11-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxi-dev \
            libxinerama-dev \
            xvfb

      # ── Cache CMake build directory ─────────────────────────────────────────
      - name: Cache CMake dependencies
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: cmake-deps-${{ runner.os }}-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: cmake-deps-${{ runner.os }}-

      # ── Configure ───────────────────────────────────────────────────────────
      - name: Configure CMake
        run: |
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release

      # ── Build ────────────────────────────────────────────────────────────────
      - name: Build
        run: cmake --build build --parallel

      # ── Test ─────────────────────────────────────────────────────────────────
      - name: Run tests
        run: xvfb-run -a ctest --test-dir build --output-on-failure --parallel 4

      # ── Upload test results on failure ────────────────────────────────────────
      - name: Upload test logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: build/Testing/
          retention-days: 7

  deploy-docs:
    name: Deploy Documentation
    needs: build-and-test  # Only deploy if tests pass
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install MkDocs and dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs-material mkdocs-material[imaging]

      - name: Deploy to GitHub Pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          python -m mkdocs gh-deploy --force