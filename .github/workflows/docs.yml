name: Deploy Docs

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed for mkdocs git-revision-date plugin

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install MkDocs and dependencies
        run: |
          pip install \
            mkdocs-material \
            mkdocs-material[imaging]

      - name: Deploy to GitHub Pages
        if: github.event_name == 'push'
        run: mkdocs gh-deploy --force

      - name: Build only (PR preview check)
        if: github.event_name == 'pull_request'
        run: mkdocs build --strict
