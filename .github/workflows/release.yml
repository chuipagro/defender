name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  release-linux:
    name: Package Linux Release
    runs-on: ubuntu-22.04
    permissions:
      contents: write   # needed to create/upload the GitHub Release

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ── Dependencies ─────────────────────────────────────────────────────────
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build \
            libgl1-mesa-dev \
            libudev-dev \
            libfreetype6-dev \
            libopenal-dev \
            libvorbis-dev \
            libflac-dev \
            libx11-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxi-dev \
            libxinerama-dev

      # ── Cache ────────────────────────────────────────────────────────────────
      - name: Cache CMake dependencies
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: cmake-deps-${{ runner.os }}-${{ hashFiles('CMakeLists.txt') }}

      # ── Configure + Build ────────────────────────────────────────────────────
      - name: Configure CMake (Release)
        run: |
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INTERPROCEDURAL_OPTIMIZATION=ON

      - name: Build
        run: cmake --build build --parallel

      # ── Strip binary ─────────────────────────────────────────────────────────
      - name: Strip binary
        run: strip build/src/defender

      # ── Package ──────────────────────────────────────────────────────────────
      - name: Package tarball
        run: |
          VERSION="${GITHUB_REF_NAME}"
          ARCHIVE="defender-${VERSION}-linux-x86_64.tar.gz"
          mkdir -p dist/defender
          cp build/src/defender dist/defender/
          # Include assets if they exist
          [ -d assets ] && cp -r assets dist/defender/ || true
          cp README.md dist/defender/ 2>/dev/null || true
          tar -czf "${ARCHIVE}" -C dist defender
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      # ── Publish GitHub Release ────────────────────────────────────────────────
      # generate_release_notes: tous les commits (directs + PR) depuis le dernier tag
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Defender ${{ github.ref_name }}"
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: ${{ env.ARCHIVE }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
